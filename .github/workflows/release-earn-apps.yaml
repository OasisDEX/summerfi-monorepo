name: Release Earn apps! 🐙

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type, major | minor | patch'
        type: choice
        options:
          - major
          - minor
          - patch
        default: 'minor'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 'Determine Release Type'
        env:
          RELEASE_TYPE_INPUT: ${{ github.event.inputs.release_type }}
        run: |
          case "$RELEASE_TYPE_INPUT" in
            major|minor|patch)
              echo "RELEASE_TYPE=$RELEASE_TYPE_INPUT" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Invalid release_type: $RELEASE_TYPE_INPUT"
              exit 1
              ;;
          esac
      - name: 'Release Type'
        run: echo ${{ env.RELEASE_TYPE }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make an earn-apps release
        working-directory: ./apps/earn-protocol
        run:
          npx release-it --ci --no-npm --git.commitMessage='Release Earn App ${version}'
          --git.tagAnnotation='Earn App' -- ${{ env.RELEASE_TYPE }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create or reuse PR from dev to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const head = 'dev'
            const base = 'main'
            const title = 'chore: merge dev into main after earn release'
            const body = 'Automated PR opened by release-earn-apps workflow.'

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
              per_page: 1,
            })

            if (prs.length > 0) {
              core.info(`PR already open: #${prs[0].number} ${prs[0].html_url}`)
              return
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title,
              body,
            })

            core.info(`Created PR: #${pr.number} ${pr.html_url}`)
      
      - name: Generate GitHub App token for e2e-tests
        id: e2e_tests_app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.E2E_TESTS_APP_ID }}
          private-key: ${{ secrets.E2E_TESTS_APP_PRIVATE_KEY }}
          owner: OasisDEX
          repositories: e2e-tests

      - name: Trigger prod-release e2e tests in e2e-tests repository
        run: |
          curl -fS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.e2e_tests_app_token.outputs.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/OasisDEX/e2e-tests/actions/workflows/ci_lazy_prod_release_trigger_sleep.yml/dispatches \
            -d "{\"ref\":\"main\", \"inputs\":{\"run_id\":\"${{ github.run_id }}\", \"repository\":\"${{ github.repository }}\"}}"
          echo 'See test results in https://github.com/OasisDEX/e2e-tests/actions/workflows/ci_lazy_prod_release_trigger_sleep.yml --> Job with RUN_ID ${{ github.run_id }} in the logs.'
